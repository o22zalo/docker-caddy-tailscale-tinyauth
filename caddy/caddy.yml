# =============================================================================
# caddy/caddy.yml — reverse proxy (caddy-docker-proxy)
# =============================================================================
#
# Env — thứ tự ưu tiên:
#   1) env_file ../.env  2) env_file ./.env  3) environment (YAML thắng)
# Catalog: caddy/.env.example
#
# Không inject CADDY_DOCKER_* rỗng qua environment — empty string có thể bị
# plugin coi là "đã cấu hình" và làm hỏng bootstrap. Optional: chỉ set trong .env.
#
# Profiles: caddy | core | full
# Docs: https://github.com/lucaslorentz/caddy-docker-proxy#options
# =============================================================================

services:
  caddy:
    image: lucaslorentz/caddy-docker-proxy:2.13.1
    container_name: caddy
    restart: unless-stopped
    ports:
      # Bind loopback — Tunnel/Tailscale là entry point.
      # Mở 0.0.0.0 nếu muốn host IP truy cập trực tiếp (bỏ qua auth layer).
      - "127.0.0.1:${CADDY_HTTP_PORT:-80}:80"
      # :443 không cần — TLS terminate ở Cloudflare/Tailscale. Uncomment nếu muốn local TLS testing.
      # - "127.0.0.1:${CADDY_HTTPS_PORT:-443}:443"
    env_file:
      - path: ../.env
        required: false
      - path: .env
        required: false
    environment:
      # Stack defaults only (non-empty). Extra CADDY_DOCKER_* via env_file/.env.
      CADDY_INGRESS_NETWORKS: ${CADDY_INGRESS_NETWORKS:-proxy}
      CADDY_DOCKER_MODE: ${CADDY_DOCKER_MODE:-standalone}
    volumes:
      # Read-only socket — caddy-docker-proxy chỉ cần read. Nếu cần write → cân nhắc tecnativa/docker-socket-proxy.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      caddy: (tinyauth_forwarder)
      caddy.forward_auth: tinyauth:3000
      caddy.forward_auth.uri: /api/auth/caddy
      caddy.forward_auth.copy_headers: Remote-User Remote-Name Remote-Email Remote-Groups
    profiles:
      - caddy
      - core
      - full

volumes:
  caddy-data:
  caddy-config:

# =============================================================================
# caddy/caddy.yml — reverse proxy (caddy-docker-proxy)
# =============================================================================
#
# Env — thứ tự ưu tiên:
#   1) env_file ../.env  2) env_file ./.env  3) environment (YAML thắng)
# Catalog: caddy/.env.example
#
# Profiles: caddy | core | full
# Docs: https://github.com/lucaslorentz/caddy-docker-proxy#options
# =============================================================================

services:
  caddy:
    image: lucaslorentz/caddy-docker-proxy:2.10.0
    container_name: caddy
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    env_file:
      - path: ../.env
        required: false
      - path: .env
        required: false
    environment:
      # Stack default: ingress network `proxy` (ghi đè nếu .env set khác)
      CADDY_INGRESS_NETWORKS: ${CADDY_INGRESS_NETWORKS:-proxy}
      CADDY_DOCKER_MODE: ${CADDY_DOCKER_MODE:-standalone}
      CADDY_DOCKER_LABEL_PREFIX: ${CADDY_DOCKER_LABEL_PREFIX:-}
      CADDY_DOCKER_PROXY_SERVICE_TASKS: ${CADDY_DOCKER_PROXY_SERVICE_TASKS:-}
      CADDY_DOCKER_PROCESS_CADDYFILE: ${CADDY_DOCKER_PROCESS_CADDYFILE:-}
      CADDY_DOCKER_SCAN_STOPPED_CONTAINERS: ${CADDY_DOCKER_SCAN_STOPPED_CONTAINERS:-}
      CADDY_DOCKER_POLLING_INTERVAL: ${CADDY_DOCKER_POLLING_INTERVAL:-}
      CADDY_DOCKER_EVENT_THROTTLE_INTERVAL: ${CADDY_DOCKER_EVENT_THROTTLE_INTERVAL:-}
      CADDY_DOCKER_LOG_LEVEL: ${CADDY_DOCKER_LOG_LEVEL:-}
      CADDY_DOCKER_LOG_FORMAT: ${CADDY_DOCKER_LOG_FORMAT:-}
      CADDY_DOCKER_CADDYFILE_PATH: ${CADDY_DOCKER_CADDYFILE_PATH:-}
      CADDY_DOCKER_ENVFILE: ${CADDY_DOCKER_ENVFILE:-}
      CADDY_DOCKER_SOCKETS: ${CADDY_DOCKER_SOCKETS:-}
      CADDY_DOCKER_CERTS_PATH: ${CADDY_DOCKER_CERTS_PATH:-}
      CADDY_DOCKER_APIS_VERSION: ${CADDY_DOCKER_APIS_VERSION:-}
      CADDY_DOCKER_NO_SCOPE: ${CADDY_DOCKER_NO_SCOPE:-}
      CADDY_CONTROLLER_NETWORK: ${CADDY_CONTROLLER_NETWORK:-}
      CADDY_ADMIN: ${CADDY_ADMIN:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - proxy
    labels:
      caddy: (tinyauth_forwarder)
      caddy.forward_auth: tinyauth:3000
      caddy.forward_auth.uri: /api/auth/caddy
      caddy.forward_auth.copy_headers: Remote-User Remote-Name Remote-Email Remote-Groups
    profiles:
      - caddy
      - core
      - full

volumes:
  caddy-data:
  caddy-config:

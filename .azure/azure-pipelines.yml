# =============================================================================
# .azure/azure-pipelines.yml — Azure Pipelines mirror of .github/workflows/test.yml
# =============================================================================
#
# Proves the stack starts and is reachable from the outside, exactly like the
# GitHub Actions "stack-test" workflow. It reuses the SAME Node runner scripts
# (scripts/runners/*.mjs, scripts/wait-and-test.mjs) so behaviour stays in sync.
#
# This pipeline is for runtime smoke testing only. App validation/builds live in
# .azure/apps-pipelines.yml.
#
# Secrets: define a secret variable ENV_FILE (whole .env content) in the pipeline
# / a variable group. If unset, the stack falls back to .env.ci + quick tunnel.
# =============================================================================

trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - "*"

pool:
  vmImage: ubuntu-latest

variables:
  DOCKER_CACHE_PATH: $(Pipeline.Workspace)/docker-images-cache.tar
  BUILDX_CACHE: $(Pipeline.Workspace)/.buildx-cache
  BUILDX_CACHE_NEW: $(Pipeline.Workspace)/.buildx-cache-new
  TEST_TIMEOUT: "180"
  KEEP_ALIVE_MINUTES: "5"
  KEEP_INTERVAL_SECONDS: "30"

jobs:
  - job: smoke
    displayName: "Compose up + external access"
    timeoutInMinutes: 120
    steps:
      # ── Node + deps ─────────────────────────────────────────────
      - task: NodeTool@0
        inputs:
          versionSpec: "20.x"
        displayName: "Use Node 20"

      - script: npm ci
        displayName: "Install dependencies"

      # ── Image cache key + restore ───────────────────────────────
      - script: node scripts/runners/cache-docker-build-azure.mjs vars
        displayName: "Compute Docker cache key"

      - task: Cache@2
        inputs:
          key: '"$(DOCKER_CACHE_KEY)"'
          path: $(DOCKER_CACHE_PATH)
          cacheHitVar: DOCKER_IMAGE_CACHE_HIT
        displayName: "Restore Docker image cache"

      - script: node scripts/runners/cache-docker-build-azure.mjs restore
        displayName: "Load cached Docker images"

      # ── Buildx setup ─────────────────────────────────────────────
      - script: |
          docker buildx create --use --name azbuilder || docker buildx use azbuilder
          docker buildx inspect --bootstrap
        displayName: "Set up Docker Buildx"
        condition: ne(variables.DOCKER_IMAGE_CACHE_HIT, 'true')

      # ── Buildx layer cache (per infra scope) ─────────────────────
      - task: Cache@2
        inputs:
          key: 'buildx | webssh | "$(Agent.OS)" | webssh/Dockerfile'
          path: $(BUILDX_CACHE)/webssh
        displayName: "Cache buildx layers (webssh)"
        condition: ne(variables.DOCKER_IMAGE_CACHE_HIT, 'true')

      - task: Cache@2
        inputs:
          key: 'buildx | rclone | "$(Agent.OS)" | rclone/Dockerfile'
          path: $(BUILDX_CACHE)/rclone
        displayName: "Cache buildx layers (rclone)"
        condition: ne(variables.DOCKER_IMAGE_CACHE_HIT, 'true')

      - task: Cache@2
        inputs:
          key: 'buildx | orchestrator | "$(Agent.OS)" | orchestrator/Dockerfile | orchestrator/package-lock.json'
          path: $(BUILDX_CACHE)/orchestrator
        displayName: "Cache buildx layers (orchestrator)"
        condition: ne(variables.DOCKER_IMAGE_CACHE_HIT, 'true')

      # ── Infra image builds ───────────────────────────────────────
      - script: |
          docker buildx build \
            --load \
            --tag proxy-stack-webssh:latest \
            --cache-from type=local,src=$(BUILDX_CACHE)/webssh \
            --cache-to type=local,dest=$(BUILDX_CACHE_NEW)/webssh,mode=max \
            --file ./webssh/Dockerfile \
            ./webssh
        displayName: "Build webssh image"
        condition: ne(variables.DOCKER_IMAGE_CACHE_HIT, 'true')

      - script: |
          docker buildx build \
            --load \
            --tag proxy-stack-rclone:local \
            --cache-from type=local,src=$(BUILDX_CACHE)/rclone \
            --cache-to type=local,dest=$(BUILDX_CACHE_NEW)/rclone,mode=max \
            --file ./rclone/Dockerfile \
            .
        displayName: "Build rclone image"
        condition: ne(variables.DOCKER_IMAGE_CACHE_HIT, 'true')

      - script: |
          docker buildx build \
            --load \
            --tag proxy-stack-orchestrator:local \
            --cache-from type=local,src=$(BUILDX_CACHE)/orchestrator \
            --cache-to type=local,dest=$(BUILDX_CACHE_NEW)/orchestrator,mode=max \
            --file ./orchestrator/Dockerfile \
            .
        displayName: "Build orchestrator image"
        condition: ne(variables.DOCKER_IMAGE_CACHE_HIT, 'true')

      # Move new buildx caches into place so Cache@2 saves fresh layers.
      - script: |
          rm -rf $(BUILDX_CACHE)
          mv $(BUILDX_CACHE_NEW) $(BUILDX_CACHE) 2>/dev/null || true
        displayName: "Rotate buildx cache"
        condition: and(always(), ne(variables.DOCKER_IMAGE_CACHE_HIT, 'true'))

      # ── Environment ──────────────────────────────────────────────
      - script: node scripts/runners/setup-env.mjs
        displayName: "Setup environment"
        env:
          ENV_FILE: $(ENV_FILE)

      - script: node scripts/runners/setup-tinyauth-ci-user.mjs
        displayName: "Add Tinyauth CI bot"

      # ── Stack ────────────────────────────────────────────────────
      - script: node scripts/runners/start-stack.mjs
        displayName: "Start stack"

      - script: node scripts/runners/cache-docker-build-azure.mjs save
        displayName: "Save Docker images to cache"
        condition: always()

      # ── Verify ───────────────────────────────────────────────────
      - script: node scripts/wait-and-test.mjs
        displayName: "Wait and verify external access"
        env:
          TEST_TIMEOUT: "180"

      - script: |
          if [ -f public-url.txt ]; then echo "Public URL: $(cat public-url.txt)"; fi
          docker compose ps || docker ps -a || true
        displayName: "Show public URL"
        condition: always()

      - script: node scripts/runners/keep-alive.mjs
        displayName: "Keep-alive heartbeat"
        env:
          KEEP_ALIVE_MINUTES: $(KEEP_ALIVE_MINUTES)
          KEEP_INTERVAL_SECONDS: $(KEEP_INTERVAL_SECONDS)
        condition: and(succeeded(), ne(variables['KEEP_ALIVE_MINUTES'], '0'))

      # ── Teardown ─────────────────────────────────────────────────
      - script: node scripts/runners/collect-logs.mjs
        displayName: "Collect logs"
        condition: always()

      - task: PublishPipelineArtifact@1
        inputs:
          targetPath: ci-logs
          artifact: "stack-logs-$(Build.BuildId)-$(System.JobAttempt)"
        displayName: "Upload logs artifact"
        condition: always()

      - script: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v --remove-orphans \
            || docker compose down -v --remove-orphans || true
        displayName: "Tear down"
        condition: always()

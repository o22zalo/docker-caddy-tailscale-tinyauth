# =============================================================================
# whoami/whoami.yml — app demo (upstream)
# =============================================================================
#
# Env — thứ tự ưu tiên:
#   1) env_file ../.env  2) env_file ./.env  3) environment (YAML thắng)
# Catalog: whoami/.env.example
# Profiles: whoami | core | full
# =============================================================================

services:
  whoami:
    image: traefik/whoami:v1.11.0
    container_name: whoami
    restart: unless-stopped
    env_file:
      - path: ../.env
        required: false
      - path: .env
        required: false
    # Optional WHOAMI_NAME / PORT etc.: set only in root .env (env_file).
    # Do not inject empty strings via environment: — omit key when unused.
    #
    # NODE ID ECHO (Phần 1 #3): whoami echo "Name: <node-id>" trong body để CI
    # đối chiếu leader đang chạy. Chỉ set khi có giá trị (tránh inject rỗng):
    #   WHOAMI_NAME ưu tiên; nếu trống, dùng ORCH_NODE_ID (node id của runner).
    # Compose bỏ qua biến rỗng vì có :- fallback lồng nhau về chính nó → nếu
    # cả hai trống, WHOAMI_NAME sẽ không được set (image dùng hostname mặc định).
    environment:
      WHOAMI_NAME: ${WHOAMI_NAME:-${ORCH_NODE_ID:-whoami}}
    networks:
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    labels:
      caddy: ${CADDY_WHOAMI_HOST:-${WHOAMI_HOST:-http://whoami.${DOMAIN:-localhost}}}
      caddy.reverse_proxy: "{{upstreams 80}}"
      caddy.import: whoami_tinyauth_forwarder *
    profiles:
      - whoami
      - core
      - full

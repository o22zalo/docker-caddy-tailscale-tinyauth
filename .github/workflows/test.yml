name: stack-test

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
    inputs:
      run_group:
        description: "Concurrency group shared by self-dispatch and external cron channels"
        required: false
        default: ""
      next_run_enable:
        description: "Dispatch the next workflow run (true/false/1/0, empty = true)"
        required: false
        default: "true"
      next_run_minutes:
        description: "Expected lifetime of this workflow before dispatch is allowed"
        required: false
        default: "58"

concurrency:
  group: ${{ github.event.inputs.run_group || format('{0}-{1}', github.workflow, github.ref_name) }}
  cancel-in-progress: false

env:
  DOCKER_BUILD_SUMMARY: "false"
  DOCKER_BUILD_RECORD_UPLOAD: "false"

permissions:
  actions: write
  checks: write
  contents: write
  deployments: write
  discussions: write
  id-token: write
  issues: write
  packages: write
  pages: write
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write

jobs:
  smoke:
    name: Compose up + external access
    runs-on: ubuntu-latest
    timeout-minutes: 360
    if: |
      (github.event_name == 'push' && github.repository == 'o861cloudflare/dockerstack-s3proxy') ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: P1 Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: P1 Mark workflow start
        run: node scripts/runner-cronjob/keepalive-dispatch.mjs --mark-start

      - name: P1 Setup Node with cache
        uses: actions/setup-node@v7
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            nodesync/package-lock.json
            orchestrator/package-lock.json

      # Split restore/save: combined actions/cache post-if is success() only,
      # so a later step failure would skip saving. save-always is deprecated.
      # https://github.com/actions/cache/tree/main/save#always-save-cache
      - name: Restore runner tools cache
        id: cache-runner-tools
        uses: actions/cache/restore@v5
        with:
          path: scripts/runner-tools/.cache
          key: runner-tools-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/runner-tools/tools-config.jsonc') }}
          restore-keys: |
            runner-tools-${{ runner.os }}-${{ runner.arch }}-

      - name: P1 Install dependencies and tools
        run: |
          date -u '+P1 start %FT%T.%3NZ'
          npm ci --loglevel=error
          npm ci --prefix nodesync --omit=dev --loglevel=error
          npm ci --prefix orchestrator --omit=dev --loglevel=error
          node scripts/runner-tools/install-tool.mjs --all
          date -u '+P1 end %FT%T.%3NZ'

      # Save right after install so later smoke failures still warm the cache.
      - name: Save runner tools cache
        if: always() && steps.cache-runner-tools.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: scripts/runner-tools/.cache
          key: ${{ steps.cache-runner-tools.outputs.cache-primary-key }}

      - name: P2 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: P2 Build images with BuildKit cache
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          date -u '+P2 bake start %FT%T.%3NZ'
          mkdir -p ci-runtime
          docker buildx bake \
            --file .github/workflows/docker-bake.hcl \
            --set "*.args.GIT_SHA=$GIT_SHA" \
            --metadata-file ci-runtime/bake-metadata.json \
            --load \
            default
          date -u '+P2 bake end %FT%T.%3NZ'
          echo "--- images after bake ---"
          docker image ls --format "{{.Repository}}:{{.Tag}} ({{.ID}})" | grep -i proxy-stack || echo "NO proxy-stack images found!"

      - name: P2 Verify local images
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: node scripts/runners/verify-stack-images.mjs

      - name: P3 Setup environment
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
          DOTENVRTDB_URL: ${{ secrets.DOTENVRTDB_URL }}
        run: |
          date -u '+P3 start %FT%T.%3NZ'
          node scripts/runners/setup-env.mjs
          date -u '+P3 end %FT%T.%3NZ'

      - name: P4 Setup Host
        run: |
          date -u '+P4 start %FT%T.%3NZ'
          node scripts/runners/setup-host.mjs
          date -u '+P4 end %FT%T.%3NZ'

      - name: P5 Start stack
        run: |
          date -u '+P5 start %FT%T.%3NZ'
          node scripts/runners/start-stack.mjs
          date -u '+P5 end %FT%T.%3NZ'

      - name: P6 Verify stack
        env:
          TEST_TIMEOUT: "180"
        run: node scripts/wait-and-test.mjs

      - name: Show public URL and status
        if: always()
        run: |
          if [ -f public-url.txt ]; then cat public-url.txt; fi
          docker compose ps >> "$GITHUB_STEP_SUMMARY" 2>&1 || docker ps -a >> "$GITHUB_STEP_SUMMARY" 2>&1 || true

      - name: P7 Keep-alive heartbeat
        if: |
          (github.event_name == 'push' && vars.CRONJON_NEXT_RUN_ENABLE != 'false' && vars.CRONJON_NEXT_RUN_ENABLE != '0') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.next_run_enable != 'false' && github.event.inputs.next_run_enable != '0')
        env:
          KEEP_MIN: ${{ github.event.inputs.next_run_minutes || vars.CRONJON_NEXT_RUN_MINUTES || '58' }}
          KEEP_INTERVAL_SECONDS: "30"
        run: node scripts/runners/keep-alive.mjs

      - name: P7 Self-dispatch next run
        if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CRONJOB_RUN_GROUP: ${{ github.event.inputs.run_group || format('{0}-{1}', github.workflow, github.ref_name) }}
          CRONJON_NEXT_RUN_ENABLE: ${{ github.event.inputs.next_run_enable || vars.CRONJON_NEXT_RUN_ENABLE || 'true' }}
          CRONJON_NEXT_RUN_MINUTES: ${{ github.event.inputs.next_run_minutes || vars.CRONJON_NEXT_RUN_MINUTES || '58' }}
          CRONJOB_DISPATCH_PAT: ${{ secrets.CRONJOB_DISPATCH_PAT }}
          CRONJOB_CRONJOBORG_ENABLE: ${{ vars.CRONJOB_CRONJOBORG_ENABLE || '' }}
          CRONJOB_CRONJOBORG_API_KEY: ${{ secrets.CRONJOB_CRONJOBORG_API_KEY }}
          CRONJOB_CRONJOBORG_MINUTE: ${{ vars.CRONJOB_CRONJOBORG_MINUTE || '0' }}
          CRONJOB_EASYCRON_ENABLE: ${{ vars.CRONJOB_EASYCRON_ENABLE || '' }}
          CRONJOB_EASYCRON_API_KEY: ${{ secrets.CRONJOB_EASYCRON_API_KEY }}
          CRONJOB_EASYCRON_CRON: ${{ vars.CRONJOB_EASYCRON_CRON || '0 * * * *' }}
          CRONJOB_FASTCRON_ENABLE: ${{ vars.CRONJOB_FASTCRON_ENABLE || '' }}
          CRONJOB_FASTCRON_TOKEN: ${{ secrets.CRONJOB_FASTCRON_TOKEN }}
          CRONJOB_FASTCRON_EXPRESSION: ${{ vars.CRONJOB_FASTCRON_EXPRESSION || '0 * * * *' }}
          CRONJOB_QSTASH_ENABLE: ${{ vars.CRONJOB_QSTASH_ENABLE || '' }}
          CRONJOB_QSTASH_TOKEN: ${{ secrets.CRONJOB_QSTASH_TOKEN }}
          CRONJOB_QSTASH_CRON: ${{ vars.CRONJOB_QSTASH_CRON || '0 * * * *' }}
          CRONJOB_QSTASH_SCHEDULE_ID: ${{ vars.CRONJOB_QSTASH_SCHEDULE_ID || format('gh-keepalive-{0}-{1}', github.workflow, github.ref_name) }}
          CRONJOB_WEBHOOK_ENABLE: ${{ vars.CRONJOB_WEBHOOK_ENABLE || '' }}
          CRONJOB_WEBHOOK_URL: ${{ vars.CRONJOB_WEBHOOK_URL || '' }}
          CRONJOB_WEBHOOK_TOKEN: ${{ secrets.CRONJOB_WEBHOOK_TOKEN }}
        run: node scripts/runner-cronjob/keepalive-dispatch.mjs

      - name: P8 Collect logs
        if: always()
        run: node scripts/runners/collect-logs.mjs

      - name: P8 Analyze workflow
        if: always()
        run: node scripts/runners/analyze-workflow.mjs

      - name: P8 Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stack-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-logs/
          if-no-files-found: warn
          retention-days: 14

      - name: P8 Dump logs on failure
        if: failure()
        run: |
          docker compose ps -a || docker ps -a || true
          docker compose logs --no-color --tail=200 || true

      - name: P8 Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v --remove-orphans || docker compose down -v --remove-orphans || true

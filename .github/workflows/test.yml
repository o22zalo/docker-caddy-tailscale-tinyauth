name: stack-test

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
    inputs:
      keep_alive_minutes:
        description: "Keep the stack up after the smoke test passes (minutes, 0 = off)"
        required: false
        default: "5"
      keep_alive_interval:
        description: "Heartbeat log interval while kept alive (seconds)"
        required: false
        default: "30"

# concurrency:
#   group: stack-test-${{ github.ref }}
#   cancel-in-progress: true

jobs:
  smoke:
    name: Compose up + external access
    runs-on: ubuntu-latest
    timeout-minutes: 360
    if: vars.ENABLE_SMOKE != 'false'

    steps:
      # ── Cache ─────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix nodesync --omit=dev
          npm ci --prefix orchestrator --omit=dev

      - name: Run orchestrator + nodesync regression tests
        working-directory: .work/verify
        run: |
          node verify-election.mjs
          node verify-nodesync.mjs
          node verify-nodesync-scenarios.mjs
          node verify-hold-gate.mjs
          node verify-source-invariants.mjs

      - name: Compute Docker cache key
        run: node scripts/runners/cache-docker-build-github.mjs env

      - name: Restore Docker image cache
        id: docker-image-cache
        uses: actions/cache@v6
        with:
          path: ${{ env.DOCKER_CACHE_PATH }}
          key: ${{ env.DOCKER_CACHE_KEY }}

      - name: Load cached Docker images
        run: node scripts/runners/cache-docker-build-github.mjs restore

      - name: Set up Docker Buildx
        if: steps.docker-image-cache.outputs.cache-hit != 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build webssh image
        if: steps.docker-image-cache.outputs.cache-hit != 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./webssh
          file: ./webssh/Dockerfile
          tags: proxy-stack-webssh:latest
          load: true
          cache-from: type=gha,scope=webssh
          cache-to: type=gha,mode=max,scope=webssh

      - name: Build rclone image
        if: steps.docker-image-cache.outputs.cache-hit != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./rclone/Dockerfile
          tags: proxy-stack-rclone:local
          load: true
          cache-from: type=gha,scope=rclone
          cache-to: type=gha,mode=max,scope=rclone

      - name: Build orchestrator image
        if: steps.docker-image-cache.outputs.cache-hit != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./orchestrator/Dockerfile
          tags: proxy-stack-orchestrator:local
          load: true
          cache-from: type=gha,scope=orchestrator
          cache-to: type=gha,mode=max,scope=orchestrator

      - name: Build nodesync image
        if: steps.docker-image-cache.outputs.cache-hit != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./nodesync/Dockerfile
          tags: proxy-stack-nodesync:local
          load: true
          cache-from: type=gha,scope=nodesync
          cache-to: type=gha,mode=max,scope=nodesync

      # ── Environment ───────────────────────────────────────────────
      - name: Setup environment
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: node scripts/runners/setup-env.mjs

      - name: Add Tinyauth CI bot
        run: node scripts/runners/setup-tinyauth-ci-user.mjs

      # ── Stack ─────────────────────────────────────────────────────
      - name: Start stack
        run: node scripts/runners/start-stack.mjs

      - name: Save Docker images to cache
        if: always()
        run: node scripts/runners/cache-docker-build-github.mjs save

      # ── Verify ────────────────────────────────────────────────────
      - name: Wait and verify external access
        env:
          TEST_TIMEOUT: "180"
        run: node scripts/wait-and-test.mjs

      # ── Verify leader ↔ whoami (orchestration) ────────────────────
      # Sau khi node lên leader: curl whoami.{DOMAIN} mỗi 5s, đối chiếu
      # "Name:" (= node id) có trùng leader đang chạy trên RTDB không.
      # Chỉ chạy khi bật orchestration (CONSUL_ENABLE=1).
      - name: Verify leader matches whoami
        if: always()
        env:
          VERIFY_LEADER_TIMEOUT: "120"
          VERIFY_LEADER_INTERVAL: "5"
          VERIFY_LEADER_STRICT: "1"
        run: node scripts/runners/verify-leader-whoami.mjs

      - name: Show public URL
        if: always()
        run: |
          if [ -f public-url.txt ]; then
            echo "Public URL: $(cat public-url.txt)"
            echo "PUBLIC_URL=$(cat public-url.txt)" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "## Container status" >> "$GITHUB_STEP_SUMMARY"
          docker compose ps >> "$GITHUB_STEP_SUMMARY" 2>&1 || docker ps -a >> "$GITHUB_STEP_SUMMARY" 2>&1 || true

      # ── Keep-alive (push + manual runs) ───────────────────────────
      - name: Keep-alive heartbeat
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.keep_alive_minutes != '0')
        env:
          KEEP_MIN: ${{ github.event.inputs.keep_alive_minutes || '5' }}
          KEEP_INTERVAL_SECONDS: ${{ github.event.inputs.keep_alive_interval || '30' }}
        run: node scripts/runners/keep-alive.mjs

      # ── Teardown ──────────────────────────────────────────────────
      - name: Collect logs
        if: always()
        run: node scripts/runners/collect-logs.mjs

      - name: Analyze workflow run
        if: always()
        run: node scripts/runners/analyze-workflow.mjs

      - name: Install opencode
        if: always()
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> "$GITHUB_PATH"

      - name: Analyze and report errors
        if: always()
        run: node scripts/runners/ai-agents/opencode-analyze.mjs

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stack-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-logs/
          if-no-files-found: warn
          retention-days: 14

      - name: Dump logs on failure
        if: failure()
        run: |
          # Fallback to .env.ci if .env missing or incomplete
          if [ ! -f .env ] || ! grep -q TINYAUTH_AUTH_USERS .env 2>/dev/null; then
            cp .env.ci .env 2>/dev/null || true
          fi
          docker compose ps -a || docker ps -a || true
          echo "===== all services (tail 200) ====="
          docker compose logs --no-color --tail=200 2>&1 || docker logs --tail=200 $(docker ps -aq) 2>&1 || true
          for svc in caddy tinyauth whoami cloudflared tailscale litestream rclone; do
            echo "===== $svc (tail 100) ====="
            docker compose logs --no-color --tail=100 "$svc" 2>&1 || docker logs --tail=100 "$svc" 2>&1 || true
          done

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v --remove-orphans || docker compose down -v --remove-orphans || true

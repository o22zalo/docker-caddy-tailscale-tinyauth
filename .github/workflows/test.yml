name: stack-test

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
    inputs:
      keep_alive_minutes:
        description: "Keep the stack up after the smoke test passes (minutes, 0 = off)"
        required: false
        default: "50"
      keep_alive_interval:
        description: "Heartbeat log interval while kept alive (seconds)"
        required: false
        default: "30"

concurrency:
  group: stack-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DOCKER_BUILD_SUMMARY: "false"
  DOCKER_BUILD_RECORD_UPLOAD: "false"

permissions:
  actions: write
  checks: write
  contents: write
  deployments: write
  discussions: write
  id-token: write
  issues: write
  packages: write
  pages: write
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write

jobs:
  smoke:
    name: Compose up + external access
    runs-on: ubuntu-latest
    timeout-minutes: 360
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: P1 Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: P1 Setup Node with cache
        uses: actions/setup-node@v7
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            nodesync/package-lock.json
            orchestrator/package-lock.json

      - name: P1 Install dependencies and tools
        run: |
          echo "P1 start $(date -u +%FT%T.%3NZ)"
          npm ci --loglevel=error
          npm ci --prefix nodesync --omit=dev --loglevel=error
          npm ci --prefix orchestrator --omit=dev --loglevel=error
          node scripts/runner-tools/install-tool.mjs --all
          echo "P1 end $(date -u +%FT%T.%3NZ)"

      - name: P2 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: P2 Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: P2 Build images with BuildKit cache
        env:
          GIT_SHA: ${{ github.sha }}
          REGISTRY_CACHE: ghcr.io/${{ github.repository }}
        run: |
          echo "P2 bake start $(date -u +%FT%T.%3NZ)"
          mkdir -p ci-runtime
          docker buildx bake \
            --file .github/workflows/docker-bake.hcl \
            --set "*.args.GIT_SHA=$GIT_SHA" \
            --metadata-file ci-runtime/bake-metadata.json \
            --load \
            default
          echo "P2 bake end $(date -u +%FT%T.%3NZ)"
          echo "--- images after bake ---"
          docker image ls --format "{{.Repository}}:{{.Tag}} ({{.ID}})" | grep -i proxy-stack || echo "NO proxy-stack images found!"

      - name: P2 Verify local images
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: node scripts/runners/verify-stack-images.mjs

      - name: P3 Setup environment
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          echo "P3 start $(date -u +%FT%T.%3NZ)"
          node scripts/runners/setup-env.mjs
          echo "P3 end $(date -u +%FT%T.%3NZ)"

      - name: P4 Setup Host
        run: |
          echo "P4 start $(date -u +%FT%T.%3NZ)"
          node scripts/runners/setup-host.mjs
          echo "P4 end $(date -u +%FT%T.%3NZ)"

      - name: P5 Start stack
        run: |
          echo "P5 start $(date -u +%FT%T.%3NZ)"
          node scripts/runners/start-stack.mjs
          echo "P5 end $(date -u +%FT%T.%3NZ)"

      - name: P6 Verify stack
        env:
          TEST_TIMEOUT: "180"
        run: node scripts/wait-and-test.mjs

      - name: Show public URL and status
        if: always()
        run: |
          if [ -f public-url.txt ]; then cat public-url.txt; fi
          docker compose ps >> "$GITHUB_STEP_SUMMARY" 2>&1 || docker ps -a >> "$GITHUB_STEP_SUMMARY" 2>&1 || true

      - name: P7 Keep-alive heartbeat
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.keep_alive_minutes != '0')
        env:
          KEEP_MIN: ${{ github.event.inputs.keep_alive_minutes || '50' }}
          KEEP_INTERVAL_SECONDS: ${{ github.event.inputs.keep_alive_interval || '30' }}
        run: node scripts/runners/keep-alive.mjs

      - name: P8 Collect logs
        if: always()
        run: node scripts/runners/collect-logs.mjs

      - name: P8 Analyze workflow
        if: always()
        run: node scripts/runners/analyze-workflow.mjs

      - name: P8 Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stack-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-logs/
          if-no-files-found: warn
          retention-days: 14

      - name: P8 Dump logs on failure
        if: failure()
        run: |
          docker compose ps -a || docker ps -a || true
          docker compose logs --no-color --tail=200 || true

      - name: P8 Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v --remove-orphans || docker compose down -v --remove-orphans || true

name: stack-test

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
    inputs:
      keep_alive_minutes:
        description: "Keep the stack up after the smoke test passes (minutes, 0 = off)"
        required: false
        default: "5"
      keep_alive_interval:
        description: "Heartbeat log interval while kept alive (minutes)"
        required: false
        default: "5"

concurrency:
  group: stack-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Compose up + external access
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # ── Cache ─────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v7

      - name: Compute Docker cache key
        run: node scripts/runners/cache-docker-build-github.mjs env

      - name: Restore Docker image cache
        uses: actions/cache@v6
        with:
          path: ${{ env.DOCKER_CACHE_PATH }}
          key: ${{ env.DOCKER_CACHE_KEY }}
          restore-keys: |
            docker-images-

      - name: Load cached Docker images
        run: node scripts/runners/cache-docker-build-github.mjs restore

      # ── Environment ───────────────────────────────────────────────
      - name: Setup environment
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: node scripts/runners/setup-env.mjs

      # ── Stack ─────────────────────────────────────────────────────
      - name: Start stack
        run: node scripts/runners/start-stack.mjs

      - name: Save Docker images to cache
        if: always()
        run: node scripts/runners/cache-docker-build-github.mjs save

      # ── Verify ────────────────────────────────────────────────────
      - name: Wait and verify external access
        env:
          TEST_TIMEOUT: "180"
        run: ./scripts/wait-and-test.sh

      - name: Show public URL
        if: always()
        run: |
          if [ -f public-url.txt ]; then
            echo "Public URL: $(cat public-url.txt)"
            echo "PUBLIC_URL=$(cat public-url.txt)" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "## Container status" >> "$GITHUB_STEP_SUMMARY"
          docker compose ps >> "$GITHUB_STEP_SUMMARY" || true

      # ── Keep-alive (manual runs) ──────────────────────────────────
      - name: Keep-alive heartbeat
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.keep_alive_minutes != '0'
        env:
          KEEP_MIN: ${{ github.event.inputs.keep_alive_minutes }}
          INTERVAL_MIN: ${{ github.event.inputs.keep_alive_interval }}
        run: |
          set -euo pipefail
          total=$(( KEEP_MIN * 60 ))
          step=$(( INTERVAL_MIN * 60 ))
          [ "$step" -le 0 ] && step=300
          elapsed=0
          url="$(cat public-url.txt 2>/dev/null || echo unknown)"
          echo "Keeping stack alive for ${KEEP_MIN}m, heartbeat every ${INTERVAL_MIN}m. URL: $url"
          while [ "$elapsed" -lt "$total" ]; do
            sleep "$step"
            elapsed=$(( elapsed + step ))
            echo "[heartbeat] $(date -u +%H:%M:%SZ) ${elapsed}/${total}s — $url"
            docker compose ps
          done

      # ── Teardown ──────────────────────────────────────────────────
      - name: Collect logs
        if: always()
        run: node scripts/runners/collect-logs.mjs

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stack-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-logs/
          if-no-files-found: warn
          retention-days: 14

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose ps -a || true
          echo "===== all services (tail 200) ====="
          docker compose logs --no-color --tail=200 || true
          for svc in caddy tinyauth whoami cloudflared tailscale; do
            echo "===== $svc (tail 100) ====="
            docker compose logs --no-color --tail=100 "$svc" 2>&1 || true
          done

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v --remove-orphans || docker compose down -v --remove-orphans || true

# =============================================================================
# tailscale/tailscale.yml — node Tailscale (tailnet private access)
# =============================================================================
#
# Env — thứ tự ưu tiên:
#   1) env_file ../.env  2) env_file ./.env  3) environment (YAML thắng)
# Catalog: tailscale/.env.example
# Profiles: tailscale | full
# =============================================================================

services:
  tailscale:
    image: tailscale/tailscale:v1.98.8
    container_name: tailscale
    restart: unless-stopped
    hostname: ${TS_HOSTNAME:-proxy-stack}
    env_file:
      - path: ../.env
        required: false
      - path: .env
        required: false
    environment:
      # Auth / identity. Optional auth keys come from env_file only when set.
      TS_HOSTNAME: ${TS_HOSTNAME:-proxy-stack}
      # State + networking (path khớp volume — default stack thắng nếu .env trống)
      TS_STATE_DIR: ${TS_STATE_DIR:-/var/lib/tailscale}
      TS_USERSPACE: ${TS_USERSPACE:-true}
      # Userspace mode không tạo route tailnet cho container khác. Expose SOCKS5
      # nội bộ để nodesync SSH qua tailnet (`nc -x tailscale:1055`).
      TS_SOCKS5_SERVER: ${TS_SOCKS5_SERVER:-:1055}
      # Serve (path khớp mount serve.json)
      TS_SERVE_CONFIG: ${TS_SERVE_CONFIG:-/config/serve.json}
      # Extra flags
      TS_EXTRA_ARGS: ${TS_EXTRA_ARGS:---accept-dns=false}
    volumes:
      - ${DOCKER_VOLUME_RUNTIME_ABS:-../ci-runtime}/tailscale/state:/var/lib/tailscale
      - ./serve.json:/config/serve.json:ro
    # Tailscale Serve TCP forward trỏ tới sshd tự bootstrap trên CI runner.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - proxy
    profiles:
      - tailscale
      - full

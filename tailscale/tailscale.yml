# =============================================================================
# tailscale/tailscale.yml — node Tailscale (tailnet private access)
# =============================================================================
#
# Env — thứ tự ưu tiên:
#   1) env_file ../.env  2) env_file ./.env  3) environment (YAML thắng)
# Catalog: tailscale/.env.example
# Profiles: tailscale | full
# =============================================================================

services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    restart: unless-stopped
    hostname: ${TS_HOSTNAME:-proxy-stack}
    env_file:
      - path: ../.env
        required: false
      - path: .env
        required: false
    environment:
      # Auth / identity
      TS_AUTHKEY: ${TS_AUTHKEY:-}
      TS_AUTH_ONCE: ${TS_AUTH_ONCE:-}
      TS_CLIENT_ID: ${TS_CLIENT_ID:-}
      TS_CLIENT_SECRET: ${TS_CLIENT_SECRET:-}
      TS_ID_TOKEN: ${TS_ID_TOKEN:-}
      TS_AUDIENCE: ${TS_AUDIENCE:-}
      TS_HOSTNAME: ${TS_HOSTNAME:-proxy-stack}
      # State + networking (path khớp volume — default stack thắng nếu .env trống)
      TS_STATE_DIR: ${TS_STATE_DIR:-/var/lib/tailscale}
      TS_USERSPACE: ${TS_USERSPACE:-true}
      TS_ACCEPT_DNS: ${TS_ACCEPT_DNS:-}
      TS_ROUTES: ${TS_ROUTES:-}
      TS_DEST_IP: ${TS_DEST_IP:-}
      TS_TAILNET_TARGET_IP: ${TS_TAILNET_TARGET_IP:-}
      TS_TAILNET_TARGET_FQDN: ${TS_TAILNET_TARGET_FQDN:-}
      TS_SOCKS5_SERVER: ${TS_SOCKS5_SERVER:-}
      TS_OUTBOUND_HTTP_PROXY_LISTEN: ${TS_OUTBOUND_HTTP_PROXY_LISTEN:-}
      TS_SOCKET: ${TS_SOCKET:-}
      TS_KUBE_SECRET: ${TS_KUBE_SECRET:-}
      # Serve (path khớp mount serve.json)
      TS_SERVE_CONFIG: ${TS_SERVE_CONFIG:-/config/serve.json}
      TS_EXPERIMENTAL_SERVICE_AUTO_ADVERTISEMENT: ${TS_EXPERIMENTAL_SERVICE_AUTO_ADVERTISEMENT:-}
      # Metrics / health
      TS_ENABLE_HEALTH_CHECK: ${TS_ENABLE_HEALTH_CHECK:-}
      TS_ENABLE_METRICS: ${TS_ENABLE_METRICS:-}
      TS_LOCAL_ADDR_PORT: ${TS_LOCAL_ADDR_PORT:-}
      # Extra flags
      TS_EXTRA_ARGS: ${TS_EXTRA_ARGS:---accept-dns=false}
      TS_TAILSCALED_EXTRA_ARGS: ${TS_TAILSCALED_EXTRA_ARGS:-}
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ./serve.json:/config/serve.json:ro
    networks:
      - proxy
    profiles:
      - tailscale
      - full

volumes:
  tailscale-state:

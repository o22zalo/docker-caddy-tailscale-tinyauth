# nodesync client/controller sidecar. Không chạy sshd/Tailscale/cloudflared;
# tái sử dụng transport hiện hữu và SSH server tự bootstrap trên CI runner.
services:
  nodesync:
    build:
      context: ..
      dockerfile: nodesync/Dockerfile
    image: proxy-stack-nodesync:local
    container_name: nodesync
    restart: unless-stopped
    stop_grace_period: 20s
    env_file:
      - path: ../.env
        required: false
      - path: .env
        required: false
    environment:
      SSH_WORKSPACE: /workspace
      NODESYNC_SSH_KEY_FILE: /runtime/id_ed25519
    volumes:
      - ..:/workspace:rw
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DOCKER_VOLUME_RUNTIME_ABS:-../ci-runtime}/nodesync:/runtime:rw
    working_dir: /app
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - proxy
    profiles: [nodesync, full]

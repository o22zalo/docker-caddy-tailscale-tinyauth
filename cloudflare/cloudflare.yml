# =============================================================================
# cloudflare/cloudflare.yml — Cloudflare Tunnel (lối vào Internet)
# =============================================================================
#
# Mục đích trong dự án:
#   Chạy cloudflared để expose stack ra ngoài mà không mở port firewall.
#   Prod: named tunnel với CF_TUNNEL_TOKEN; dashboard trỏ Public Hostname
#   về http://caddy:80. CI: docker-compose.ci.yml dùng quick tunnel.
#
# Env — thứ tự ưu tiên (Compose):
#   1) env_file: ../.env  (root — mọi KEY trong .env vào container)
#   2) env_file: .env     (cloudflare/.env — tuỳ chọn, ghi đè root)
#   3) environment:       (cấu hình riêng trong YAML — ưu tiên cao nhất)
#
# Catalog: cloudflare/.env.example
# Docs: https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/configure-tunnels/tunnel-run-parameters/
#
# Profiles: cloudflare | core | full
# =============================================================================

services:
  cloudflared:
    # Pin version for reproducible CI (quick-tunnel log format + CLI flags).
    image: cloudflare/cloudflared:2026.7.1
    container_name: cloudflared
    restart: unless-stopped
    stop_grace_period: 35s
    # Named tunnel (production). CI override: docker-compose.ci.yml → --url
    # Image ENTRYPOINT is already: cloudflared --no-autoupdate
    command:
      - tunnel
      - --no-autoupdate
      - run
    env_file:
      - path: ../.env
        required: false
      - path: .env
        required: false
    environment:
      # Only pass token when non-empty so "unset" vs "" stays clean for quick mode.
      # CI file forces TUNNEL_TOKEN: "" + command --url.
      # Host .env uses CF_TUNNEL_*; container receives TUNNEL_* (cloudflared binary).
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN:-}
      TUNNEL_LOGLEVEL: ${CF_TUNNEL_LOGLEVEL:-info}
      TUNNEL_TRANSPORT_PROTOCOL: ${CF_TUNNEL_TRANSPORT_PROTOCOL:-auto}
      TUNNEL_EDGE_IP_VERSION: ${CF_TUNNEL_EDGE_IP_VERSION:-4}
      NO_AUTOUPDATE: ${NO_AUTOUPDATE:-true}
    # Linux: cho ingress ssh://host.docker.internal:22 tới sshd tự bootstrap trên runner.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - proxy
    depends_on:
      caddy:
        condition: service_healthy
    profiles:
      - cloudflare
      - core
      - full
